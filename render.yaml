services:
  - type: web
    name: pepx-research-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/products
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/app.db
      - key: APP_BASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
    disk:
      name: pepx-sqlite
      mountPath: /var/data
      sizeGB: 1
